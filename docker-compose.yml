services:
  db:
    image: postgres:15
    container_name: manutencao_db
    restart: always
    # REMOVIDO: ports (Banco de dados trancado e seguro por dentro do Docker)
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    networks:
      - default

  web:
    build: .
    container_name: manutencao-web
    restart: always
    volumes:
      - media_data:/app/media
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 5 --threads 3 --worker-class gthread"
    environment:
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DEBUG=${DEBUG}
    depends_on:
      - db
    networks:
      - default
      - rede-nginx

  redis:
    image: redis:7-alpine
    restart: always
    networks:
      - default  # ADICIONADO: para o Celery e o Django acharem o Redis

  celery_worker:
    build: .
    pull_policy: never
    command: celery -A config worker -l info
    environment:
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DEBUG=${DEBUG}
    depends_on:
      - redis
      - db
    restart: always
    networks:
      - default  # ADICIONADO

  celery_beat:
    build: .
    pull_policy: never
    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    environment:
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DEBUG=${DEBUG}
    depends_on:
      - redis
      - db
    restart: always
    networks:
      - default  # ADICIONADO

volumes:
  postgres_data:
  media_data:

networks:
  default:
  rede-nginx:
    external: true
    name: nginx-proxy-manager_default